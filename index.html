<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📚 My Book Store</h1>
        <p>Find Your Next Favorite Book</p>
    </header>

    <section class="book-container">

        <div class="book-card">
            <img src="https://via.placeholder.com/180x250?text=Book+1" alt="Book 1">
            <h2>The Great Adventure</h2>
            <p>Author: John Smith</p>
            <p class="price">$15.99</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="https://via.placeholder.com/180x250?text=Book+2" alt="Book 2">
            <h2>Learning HTML</h2>
            <p>Author: Alice Brown</p>
            <p class="price">$18.50</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="https://via.placeholder.com/180x250?text=Book+3" alt="Book 3">
            <h2>CSS Mastery</h2>
            <p>Author: David Lee</p>
            <p class="price">$20.00</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="https://via.placeholder.com/180x250?text=Book+4" alt="Book 4">
            <h2>JavaScript Basics</h2>
            <p>Author: Emma Wilson</p>
            <p class="price">$22.99</p>
            <button>Buy Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 My Book Store | All Rights Reserved</p>
    </footer>

</body>
</html>
